<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sumsel Wedding Expo 10 Banner Pack</title>
  <style>
    :root {
      --ink: #17312b;
      --green: #1d5147;
      --gold: #c89943;
      --blush: #e7b5aa;
      --ivory: #fff8ed;
      --cream: #f4e5cf;
      --white: #fffdf8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #151515;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .banner {
      position: relative;
      overflow: hidden;
      width: var(--w);
      height: var(--h);
      isolation: isolate;
      background:
        radial-gradient(circle at 14% 16%, rgba(231, 181, 170, .48), transparent 25%),
        radial-gradient(circle at 88% 72%, rgba(200, 153, 67, .22), transparent 32%),
        linear-gradient(135deg, #fffaf0 0%, #f6e8d7 48%, #e9c9bb 100%);
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: clamp(16px, 3.2vw, 52px);
      border: clamp(2px, .22vw, 4px) solid rgba(200, 153, 67, .72);
      pointer-events: none;
      z-index: 1;
    }

    .banner::after {
      content: "";
      position: absolute;
      right: -11%;
      top: -14%;
      width: 48%;
      aspect-ratio: 1;
      border-radius: 999px;
      border: clamp(18px, 2vw, 36px) solid rgba(29, 81, 71, .12);
      box-shadow: 0 0 0 clamp(14px, 1.4vw, 28px) rgba(255, 253, 248, .34);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 3;
      height: 100%;
      display: grid;
      align-content: center;
      gap: clamp(8px, 1.05vw, 18px);
      padding: clamp(32px, 6vw, 96px);
      max-width: min(74%, 1120px);
    }

    .eyebrow {
      width: max-content;
      max-width: 100%;
      padding: .46em .78em;
      border: 1px solid rgba(29, 81, 71, .34);
      background: rgba(255, 253, 248, .64);
      color: var(--green);
      font-size: clamp(15px, 1.45vw, 24px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      color: var(--green);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(46px, 5.2vw, 100px);
      line-height: .9;
      font-weight: 800;
      letter-spacing: 0;
    }

    .title span {
      display: block;
      color: var(--gold);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: .48em;
      line-height: 1.08;
      margin-top: .1em;
    }

    .subtitle {
      margin: 0;
      color: #243f38;
      font-size: clamp(20px, 1.8vw, 34px);
      line-height: 1.18;
      font-weight: 800;
      max-width: 20ch;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1vw, 18px);
      flex-wrap: wrap;
      color: var(--green);
      font-size: clamp(16px, 1.35vw, 25px);
      font-weight: 800;
      line-height: 1.15;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      max-width: 100%;
      min-height: 2.6em;
      padding: .72em 1.18em;
      background: var(--green);
      color: var(--white);
      font-size: clamp(17px, 1.35vw, 25px);
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 16px 28px rgba(29, 81, 71, .18);
    }

    .url {
      position: absolute;
      z-index: 4;
      right: clamp(28px, 4vw, 68px);
      bottom: clamp(34px, 4vw, 72px);
      color: rgba(23, 49, 43, .86);
      font-size: clamp(14px, 1.3vw, 24px);
      font-weight: 800;
      line-height: 1;
    }

    .ornament {
      position: absolute;
      z-index: 2;
      right: clamp(28px, 6vw, 100px);
      bottom: clamp(30px, 7vw, 110px);
      width: min(28%, 390px);
      aspect-ratio: 1;
      color: rgba(29, 81, 71, .95);
    }

    .rings {
      position: absolute;
      inset: 21% 10% auto auto;
      width: 62%;
      aspect-ratio: 1.25;
      opacity: .9;
    }

    .flower {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 62%;
      aspect-ratio: 1;
      background:
        radial-gradient(circle at 50% 50%, var(--gold) 0 7%, transparent 8%),
        radial-gradient(ellipse at 50% 22%, var(--blush) 0 20%, transparent 21%),
        radial-gradient(ellipse at 78% 48%, #f0c9c0 0 20%, transparent 21%),
        radial-gradient(ellipse at 50% 78%, #f0c9c0 0 20%, transparent 21%),
        radial-gradient(ellipse at 22% 48%, var(--blush) 0 20%, transparent 21%);
      border-radius: 999px;
      filter: drop-shadow(0 14px 16px rgba(29, 81, 71, .08));
    }

    .leaf {
      position: absolute;
      width: 34%;
      height: 14%;
      border-radius: 999px 0 999px 0;
      background: rgba(29, 81, 71, .2);
      transform-origin: right center;
    }

    .leaf.one { right: 53%; bottom: 5%; transform: rotate(-31deg); }
    .leaf.two { right: 1%; bottom: 43%; transform: rotate(28deg); }
    .leaf.three { right: 47%; bottom: 78%; transform: rotate(27deg); }

    .rings svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .compact .content {
      max-width: 78%;
      padding: clamp(12px, 3.4vw, 34px);
      gap: clamp(4px, .65vw, 8px);
    }

    .compact .title br {
      display: none;
    }

    .compact .title {
      font-size: clamp(14px, 2.2vw, 23px);
      line-height: .96;
      white-space: nowrap;
    }

    .compact .title span {
      display: inline;
      font-size: 1em;
      margin-left: .3em;
      margin-top: 0;
    }

    .compact .subtitle,
    .compact .eyebrow {
      display: none;
    }

    .compact .meta {
      font-size: clamp(10px, 1.5vw, 16px);
    }

    .compact .cta {
      font-size: clamp(10px, 1.4vw, 15px);
      min-height: 2.25em;
      padding: .62em .9em;
    }

    .compact .url {
      display: none;
    }

    .compact .ornament {
      width: min(22%, 190px);
      right: clamp(18px, 4vw, 45px);
      bottom: clamp(16px, 3vw, 36px);
    }

    .mobile .content {
      max-width: 82%;
      padding: 12px 18px;
      gap: 3px;
    }

    .mobile::before {
      inset: 7px;
      border-width: 1px;
    }

    .mobile .title {
      font-size: 15px;
      line-height: .94;
    }

    .mobile .title span {
      font-size: 13px;
      margin-top: 1px;
    }

    .mobile .meta {
      font-size: 11px;
    }

    .mobile .cta {
      min-height: 22px;
      padding: 0 10px;
      font-size: 10px;
    }

    .leader .content {
      padding: 15px 34px;
      gap: 5px;
    }

    .leader .title {
      font-size: 20px;
    }

    .leader .meta {
      font-size: 12px;
    }

    .leader .cta {
      display: none;
    }

    .box .title {
      font-size: 21px;
      white-space: normal;
    }

    .box .title br {
      display: block;
    }

    .mobile .ornament {
      width: 70px;
      right: 14px;
      bottom: 14px;
    }

    .story .content,
    .portrait .content,
    .square .content {
      max-width: 88%;
      align-content: end;
      padding-bottom: 15%;
      gap: clamp(10px, 1.4vw, 24px);
    }

    .story .title,
    .portrait .title,
    .square .title {
      font-size: clamp(58px, 8vw, 148px);
    }

    .story .ornament,
    .portrait .ornament,
    .square .ornament {
      width: 46%;
      top: 11%;
      right: 10%;
      bottom: auto;
    }

    .story .subtitle,
    .portrait .subtitle,
    .square .subtitle {
      max-width: 15ch;
    }

    .story .url,
    .portrait .url,
    .square .url {
      left: clamp(28px, 4vw, 68px);
      right: auto;
      bottom: 7%;
    }
  </style>
</head>
<body>
  <main class="banner" id="banner">
    <section class="content">
      <div class="eyebrow">Edisi Spesial ke-10</div>
      <h1 class="title">SUMSEL <br>WEDDING EXPO <span>10</span></h1>
      <p class="subtitle">Wedding Expo Terbesar di Sumsel</p>
      <div class="meta">Juli 2026 <span>|</span> Promo Vendor Terbaik</div>
      <div class="cta">Daftar Sekarang</div>
    </section>
    <div class="url">sumselweddingexpo.com</div>
    <div class="ornament" aria-hidden="true">
      <div class="rings">
        <svg viewBox="0 0 260 210" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="99" cy="118" r="68" stroke="currentColor" stroke-width="12"/>
          <circle cx="159" cy="118" r="68" stroke="#C89943" stroke-width="12"/>
          <path d="M129 44L153 15L177 44" stroke="#C89943" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M100 57C112 43 143 38 162 57" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="flower"></span>
      <span class="leaf one"></span>
      <span class="leaf two"></span>
      <span class="leaf three"></span>
    </div>
  </main>

  <script>
    const variants = {
      story: { w: 1080, h: 1920, cls: "story" },
      feed: { w: 1080, h: 1080, cls: "square" },
      portrait: { w: 1080, h: 1350, cls: "portrait" },
      hero: { w: 1920, h: 700, cls: "" },
      leaderboard: { w: 728, h: 90, cls: "compact leader" },
      rectangle: { w: 300, h: 250, cls: "compact box" },
      mobile: { w: 320, h: 100, cls: "compact mobile" },
    };

    const key = new URLSearchParams(window.location.search).get("variant") || "hero";
    const variant = variants[key] || variants.hero;
    const banner = document.getElementById("banner");
    banner.style.setProperty("--w", `${variant.w}px`);
    banner.style.setProperty("--h", `${variant.h}px`);
    banner.className = `banner ${variant.cls}`.trim();
    document.body.style.width = `${variant.w}px`;
    document.body.style.height = `${variant.h}px`;
    document.body.style.padding = "0";
  </script>
</body>
</html>
